<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
<title>Вместе — смотрим фильмы онлайн</title>
<style>
  /* =========================================================
     1. Design tokens
     ========================================================= */
  :root {
    --bg: #0b0a0d;
    --bg-panel: #151318;
    --bg-elevated: #1c1a21;
    --bg-input: #221f27;
    --line: #2a2730;
    --line-soft: #201e24;
    --text: #f1ede6;
    --text-dim: #948d99;
    --text-faint: #635d6a;
    --accent: #e8b23d;
    --accent-dim: #6b5726;
    --accent-soft: rgba(232, 178, 61, 0.12);
    --danger: #d1554a;
    --radius-sm: 8px;
    --radius-md: 14px;
    --radius-lg: 20px;
    --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.25);
    --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.35);
    --ease: cubic-bezier(0.25, 0.8, 0.25, 1);
    --app-height: 100dvh;
  }

  /* =========================================================
     2. Reset & base
     ========================================================= */
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
  }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-tap-highlight-color: transparent;
  }
  h1, h2, p { margin: 0; }

  input[type=text] {
    width: 100%;
    padding: 13px 14px;
    margin-bottom: 12px;
    border-radius: var(--radius-md);
    border: 1px solid var(--line);
    background: var(--bg-panel);
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    transition: border-color 0.15s var(--ease);
  }
  input[type=text]:focus { outline: none; border-color: var(--accent); }

  button {
    cursor: pointer;
    border: none;
    border-radius: var(--radius-md);
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    padding: 13px 18px;
    transition: transform 0.1s var(--ease), opacity 0.15s var(--ease), background 0.15s var(--ease);
  }
  button:active { transform: scale(0.96); }

  .btn-primary {
    width: 100%;
    background: var(--accent);
    color: #1a1508;
    box-shadow: var(--shadow-sm);
  }
  .btn-primary:hover { opacity: 0.92; }

  /* =========================================================
     3. Brand bar (hidden once inside a room)
     ========================================================= */
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 18px 20px;
    border-bottom: 1px solid var(--line);
  }
  .brand .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
  }
  .brand h1 {
    font-size: 16px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 600;
    color: var(--text-dim);
  }
  .brand h1 span { color: var(--text); }
  body.in-room .brand { display: none; }

  /* =========================================================
     4. Gate screen (join / create room)
     ========================================================= */
  #gate {
    max-width: 420px;
    margin: 8vh auto 0;
    padding: 32px 24px;
    text-align: center;
  }
  #gate h2 { font-size: 26px; margin-bottom: 6px; font-weight: 700; }
  #gate p { color: var(--text-dim); font-size: 14px; margin-bottom: 28px; }
  .hint { margin-top: 16px; font-size: 12px; color: var(--text-dim); }

  /* =========================================================
     5. Room shell
     Structure:
       .room (flex column, fixed to viewport height, never scrolls)
         .room-topbar        (fixed height)
         .room-body          (fills remaining height)
           .video-section    (fixed height on mobile, top)
           .chat-section     (flex: 1, contains scroll area + sticky input)
     ========================================================= */
  #room { display: none; }
  body.in-room, body.in-room html { overflow: hidden; }

  .room {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    height: var(--app-height, 100dvh);
    overflow: hidden;
    background: var(--bg);
  }

  .room-topbar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--line);
    background: var(--bg-panel);
  }
  .room-badge {
    font-size: 12.5px;
    color: var(--text-dim);
    padding: 5px 12px;
    border: 1px solid var(--line);
    border-radius: 999px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .viewer-count {
    font-size: 12.5px;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 5px 12px;
    border-radius: 999px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .room-body {
    flex: 1 1 0;
    min-height: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ---------- Video section ----------
     flex: 0 0 auto + an explicit min()/min-height clamp (not just
     max-height) so the block always has a real, non-ambiguous size
     even if `aspect-ratio` is computed late/unreliably by a WebView.
     This guarantees .chat-section below always receives the rest
     of the available space instead of being squeezed to 0. */
  .video-section {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    background: #000;
  }
  .video-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    height: min(40vh, 340px);
    max-height: 40vh;
    min-height: 140px;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #000;
  }
  .no-video {
    color: var(--text-faint);
    text-align: center;
    padding: 0 24px;
    font-size: 13.5px;
    line-height: 1.5;
  }

  .stage-controls {
    flex-shrink: 0;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
    padding: 10px 12px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--line);
  }
  .upload-area {
    flex: 1;
    min-width: 160px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .file-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 12px;
    background: var(--bg-elevated);
    border: 1px dashed var(--line);
    border-radius: var(--radius-sm);
    color: var(--text-dim);
    font-size: 12.5px;
    cursor: pointer;
    white-space: nowrap;
    transition: border-color 0.15s var(--ease), color 0.15s var(--ease);
  }
  .file-label:hover { border-color: var(--accent); color: var(--text); }
  input[type=file] { display: none; }
  select {
    background: var(--bg-elevated);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    padding: 9px 10px;
    font-size: 12.5px;
    font-family: inherit;
    max-width: 40vw;
  }
  #uploadProgress {
    font-size: 11.5px;
    color: var(--accent);
    white-space: nowrap;
  }

  /* ---------- Chat section ---------- */
  .chat-section {
    flex: 1 1 0;
    min-height: 0;
    display: flex;
    flex-direction: column;
    background: var(--bg-panel);
    overflow: hidden;
  }
  .chat-messages {
    /* Always visible, always the scroll container - never toggled off. */
    display: flex !important;
    flex-direction: column;
    flex: 1 1 0;
    min-height: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 12px 14px;
    gap: 6px;
    scrollbar-width: thin;
  }
  /* ---------- Message rows ----------
     avatar + name + text + time, matching the Telegram/YouTube-Live
     reference layout. All messages stay left-aligned (public/live-chat
     style); the current user's own messages get a subtle highlight
     instead of being moved to the other side. */
  .msg-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 3px 6px;
    border-radius: var(--radius-sm);
    animation: msg-in 0.18s var(--ease);
  }
  .msg-row.own {
    background: var(--accent-soft);
  }
  .msg-avatar {
    flex-shrink: 0;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: rgba(0, 0, 0, 0.55);
    margin-top: 1px;
  }
  .msg-body { flex: 1; min-width: 0; }
  .msg-name {
    font-size: 12.5px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .msg-row.own .msg-name { color: var(--text); }
  .msg-line {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .msg-text {
    flex: 1;
    min-width: 0;
    font-size: 13.5px;
    line-height: 1.4;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .msg-time {
    flex-shrink: 0;
    font-size: 10.5px;
    color: var(--text-faint);
    white-space: nowrap;
  }
  .msg.system {
    align-self: center;
    text-align: center;
    color: var(--text-faint);
    font-style: italic;
    font-size: 12px;
    padding: 2px 8px;
    animation: msg-in 0.18s var(--ease);
  }
  @keyframes msg-in {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .chat-input {
    flex-shrink: 0;
    position: sticky;
    bottom: 0;
    display: flex;
    gap: 8px;
    padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
    background: var(--bg-panel);
    border-top: 1px solid var(--line);
  }
  .chat-input input {
    flex: 1;
    margin: 0;
    background: var(--bg-input);
  }
  .chat-input button {
    background: var(--accent-dim);
    color: var(--text);
    padding: 12px 18px;
    flex-shrink: 0;
  }
  .chat-input button:hover { background: var(--accent); color: #1a1508; }

  /* =========================================================
     6. Desktop layout (>= 900px)
     ========================================================= */
  @media (min-width: 900px) {
    .room { padding: 16px; gap: 16px; }
    .room-topbar {
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
    }
    .room-body {
      flex-direction: row;
      gap: 16px;
      margin-top: 16px;
    }

    .video-section {
      flex: 1;
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-md);
    }
    .video-wrap {
      flex: 1;
      width: auto;
      aspect-ratio: auto;
      height: auto;
      max-height: none;
      min-height: 0;
    }
    .no-video { padding: 40px 24px; }

    .chat-section {
      width: 360px;
      flex: none;
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-md);
    }
    .chat-messages { padding: 16px; gap: 8px; }
    .chat-input { padding: 12px; border-radius: 0 0 var(--radius-lg) var(--radius-lg); }
  }
</style>
</head>
<body>

  <div class="brand">
    <div class="dot"></div>
    <h1><span>Вместе</span> · онлайн-кинотеатр для своих</h1>
  </div>

  <!-- Экран входа -->
  <div id="gate">
    <h2>Заходим в зал</h2>
    <p>Придумай имя и код комнаты — тот, с кем смотришь, вводит тот же код</p>
    <input type="text" id="nameInput" placeholder="Твоё имя" maxlength="20" />
    <input type="text" id="roomInput" placeholder="Код комнаты (например: friday-night)" maxlength="30" />
    <button class="btn-primary" onclick="enterRoom()">Войти в комнату</button>
    <div class="hint">Файл можно будет загрузить уже внутри комнаты</div>
  </div>

  <!-- Комната -->
  <div id="room">
    <div class="room">
      <div class="room-topbar">
        <span class="room-badge" id="roomBadge"></span>
        <span class="viewer-count" id="userCount">1 зритель</span>
      </div>

      <div class="room-body">
        <div class="video-section">
          <div class="video-wrap" id="videoWrap">
            <div class="no-video" id="noVideo">Пока ничего не выбрано — загрузите видео или выберите из списка ниже</div>
            <video id="player" controls playsinline style="display:none;"></video>
          </div>
          <div class="stage-controls">
            <div class="upload-area">
              <label class="file-label">
                📁 Загрузить видео
                <input type="file" id="fileInput" accept="video/*" onchange="handleUpload(event)" />
              </label>
              <span id="uploadProgress"></span>
            </div>
            <select id="videoSelect" onchange="pickExisting()">
              <option value="">— выбрать уже загруженное —</option>
            </select>
          </div>
        </div>

        <div class="chat-section">
          <div class="chat-messages" id="chatMessages"></div>
          <div class="chat-input">
            <input type="text" id="chatInput" placeholder="Написать..." onkeydown="if(event.key==='Enter') sendChat()" />
            <button type="button" onmousedown="event.preventDefault()" onclick="sendChat()">→</button>
          </div>
        </div>
      </div>
    </div>
  </div>

<script src="/socket.io/socket.io.js"></script>
<script>
  let socket;
  let room, name;
  let syncing = false; // флаг, чтобы не зациклить события play/pause/seek

  // Держим CSS-переменную --app-height в актуальном состоянии для браузеров,
  // где 100dvh не учитывает появление клавиатуры (некоторые версии Android WebView).
  function setAppHeight() {
    const vv = window.visualViewport;
    const h = vv ? vv.height : window.innerHeight;
    document.documentElement.style.setProperty('--app-height', h + 'px');
  }
  setAppHeight();
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', setAppHeight);
    window.visualViewport.addEventListener('scroll', setAppHeight);
  }
  window.addEventListener('resize', setAppHeight);
  window.addEventListener('orientationchange', () => setTimeout(setAppHeight, 300));

  function enterRoom() {
    name = document.getElementById('nameInput').value.trim() || 'Гость';
    room = document.getElementById('roomInput').value.trim();
    if (!room) { alert('Введите код комнаты'); return; }

    document.getElementById('gate').style.display = 'none';
    document.getElementById('room').style.display = 'block';
    document.body.classList.add('in-room');
    document.getElementById('roomBadge').textContent = 'комната: ' + room;

    socket = io();
    setupSocket();
    socket.emit('join-room', { room, name });
    loadVideoList();
  }

  function setupSocket() {
    const player = document.getElementById('player');

    socket.on('room-state', (state) => {
      if (state.video) {
        showVideo(state.video, false);
        player.currentTime = state.currentTime || 0;
      }
    });

    socket.on('video-selected', ({ filename }) => {
      showVideo(filename, false);
    });

    socket.on('sync-play', ({ time }) => {
      syncing = true;
      player.currentTime = time;
      player.play();
      setTimeout(() => syncing = false, 200);
    });

    socket.on('sync-pause', ({ time }) => {
      syncing = true;
      player.currentTime = time;
      player.pause();
      setTimeout(() => syncing = false, 200);
    });

    socket.on('sync-seek', ({ time }) => {
      syncing = true;
      player.currentTime = time;
      setTimeout(() => syncing = false, 200);
    });

    socket.on('chat-message', (msg) => {
      addChatMessage(msg);
    });

    socket.on('user-count', (count) => {
      document.getElementById('userCount').textContent =
        count + (count === 1 ? ' зритель' : ' зрителей');
    });
  }

  function showVideo(filename, notify) {
    const player = document.getElementById('player');
    document.getElementById('noVideo').style.display = 'none';
    player.style.display = 'block';
    player.src = '/video/' + filename;

    player.onplay = () => { if (!syncing) socket.emit('play', { room, time: player.currentTime }); };
    player.onpause = () => { if (!syncing) socket.emit('pause', { room, time: player.currentTime }); };
    player.onseeked = () => { if (!syncing) socket.emit('seek', { room, time: player.currentTime }); };

    if (notify) socket.emit('select-video', { room, filename });
  }

  async function handleUpload(event) {
    const file = event.target.files[0];
    if (!file) return;

    const formData = new FormData();
    formData.append('video', file);

    const progress = document.getElementById('uploadProgress');
    progress.textContent = 'Загрузка 0%';

    const xhr = new XMLHttpRequest();
    xhr.open('POST', '/upload');
    xhr.upload.onprogress = (e) => {
      if (e.lengthComputable) {
        const pct = Math.round((e.loaded / e.total) * 100);
        progress.textContent = 'Загрузка ' + pct + '%';
      }
    };
    xhr.onload = () => {
      if (xhr.status < 200 || xhr.status >= 300) {
        progress.textContent = 'Ошибка сервера: код ' + xhr.status;
        console.error('Upload failed, status:', xhr.status, 'body:', xhr.responseText);
        return;
      }
      let res;
      try {
        res = JSON.parse(xhr.responseText);
      } catch (e) {
        progress.textContent = 'Сервер вернул не JSON (см. консоль)';
        console.error('Bad response body:', xhr.responseText);
        return;
      }
      if (!res.filename) {
        progress.textContent = 'Сервер не вернул имя файла';
        console.error('Unexpected response:', res);
        return;
      }
      progress.textContent = 'Готово ✓';
      showVideo(res.filename, true);
      loadVideoList();
      setTimeout(() => progress.textContent = '', 3000);
    };
    xhr.onerror = () => {
      progress.textContent = 'Ошибка сети при загрузке';
      console.error('XHR network error during upload');
    };
    xhr.send(formData);
  }

  async function loadVideoList() {
    const res = await fetch('/videos');
    const files = await res.json();
    const select = document.getElementById('videoSelect');
    select.innerHTML = '<option value="">— выбрать уже загруженное —</option>';
    files.forEach(f => {
      const opt = document.createElement('option');
      opt.value = f;
      opt.textContent = f.replace(/^\d+-/, '');
      select.appendChild(opt);
    });
  }

  function pickExisting() {
    const filename = document.getElementById('videoSelect').value;
    if (filename) showVideo(filename, true);
  }

  function sendChat() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;
    socket.emit('chat-message', { room, text });
    input.value = '';
    // Keep the keyboard open: re-focus the *same* input node on the next
    // frame instead of letting focus sit on the button that was tapped.
    requestAnimationFrame(() => input.focus());
  }

  // --- Аватарки: детерминированный цвет по нику, без обращения к серверу ---
  function avatarColor(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) hash = (hash * 31 + str.charCodeAt(i)) >>> 0;
    const hue = hash % 360;
    return `hsl(${hue}, 60%, 55%)`;
  }
  function initials(str) {
    const s = (str || '?').trim();
    return s ? s[0].toUpperCase() : '?';
  }
  function formatTime(date) {
    return String(date.getHours()).padStart(2, '0') + ':' + String(date.getMinutes()).padStart(2, '0');
  }

  function isNearBottom(box, threshold = 60) {
    return box.scrollHeight - box.scrollTop - box.clientHeight < threshold;
  }

  function addChatMessage(msg) {
    const box = document.getElementById('chatMessages');
    // Не тащим пользователя вниз, если он специально прокрутил вверх
    // почитать историю — скроллим только если он и так был внизу.
    const wasNearBottom = isNearBottom(box);

    if (msg.system) {
      const div = document.createElement('div');
      div.className = 'msg system';
      div.textContent = msg.text;
      box.appendChild(div);
    } else {
      const displayName = msg.name || 'Гость';
      const isOwn = displayName === name;

      const row = document.createElement('div');
      row.className = 'msg-row' + (isOwn ? ' own' : '');

      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.style.background = avatarColor(displayName);
      avatar.textContent = initials(displayName);

      const bodyEl = document.createElement('div');
      bodyEl.className = 'msg-body';

      const nameEl = document.createElement('div');
      nameEl.className = 'msg-name';
      nameEl.textContent = isOwn ? displayName + ' (вы)' : displayName;

      const line = document.createElement('div');
      line.className = 'msg-line';

      const textEl = document.createElement('div');
      textEl.className = 'msg-text';
      textEl.textContent = msg.text; // textContent - без риска HTML-инъекции

      const timeEl = document.createElement('div');
      timeEl.className = 'msg-time';
      timeEl.textContent = formatTime(new Date());

      line.appendChild(textEl);
      line.appendChild(timeEl);
      bodyEl.appendChild(nameEl);
      bodyEl.appendChild(line);
      row.appendChild(avatar);
      row.appendChild(bodyEl);
      box.appendChild(row);
    }

    if (wasNearBottom) box.scrollTop = box.scrollHeight;
  }
</script>
</body>
</html>
