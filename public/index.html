<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, interactive-widget=resizes-content" />
<title>Вместе — смотрим фильмы онлайн</title>
<style>
  :root {
    --bg: #0e0d10;
    --bg-panel: #17151a;
    --line: #2a2730;
    --text: #ece7e0;
    --text-dim: #948d99;
    --accent: #e8b23d;
    --accent-dim: #6b5726;
    --danger: #d1554a;
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    overflow: hidden;
  }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 18px 20px;
    border-bottom: 1px solid var(--line);
  }
  .brand .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
  }
  .brand h1 {
    font-size: 16px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 600;
    margin: 0;
    color: var(--text-dim);
  }
  .brand h1 span { color: var(--text); }

  /* --- Экран входа --- */
  #gate {
    max-width: 420px;
    margin: 8vh auto 0;
    padding: 32px 24px;
    text-align: center;
  }
  #gate h2 {
    font-size: 26px;
    margin: 0 0 6px;
    font-weight: 700;
  }
  #gate p {
    color: var(--text-dim);
    font-size: 14px;
    margin: 0 0 28px;
  }
  input[type=text] {
    width: 100%;
    padding: 13px 14px;
    margin-bottom: 12px;
    border-radius: var(--radius);
    border: 1px solid var(--line);
    background: var(--bg-panel);
    color: var(--text);
    font-size: 15px;
  }
  input[type=text]:focus { outline: none; border-color: var(--accent); }
  button {
    cursor: pointer;
    border: none;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 600;
    padding: 13px 18px;
    transition: transform 0.1s ease, opacity 0.15s ease;
  }
  button:active { transform: scale(0.97); }
  .btn-primary {
    width: 100%;
    background: var(--accent);
    color: #17130a;
  }
  .btn-primary:hover { opacity: 0.9; }
  .hint {
    margin-top: 16px;
    font-size: 12px;
    color: var(--text-dim);
  }

  /* --- Комната --- */
  #room { display: none; }
  .room-layout {
    position: relative;
    height: calc(var(--app-height, 100dvh) - 61px);
    overflow: hidden;
  }
  .stage {
    position: absolute;
    inset: 0;
    z-index: 1;
    background: #000;
  }
  .video-wrap {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    background: #000;
  }
  video {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .no-video {
    color: var(--text-dim);
    text-align: center;
    padding: 90px 20px 20px;
    font-size: 14px;
  }
  .stage-controls {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 3;
    padding: 14px 16px;
    background: rgba(23,21,26,0.78);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--line);
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  .upload-area {
    flex: 1;
    min-width: 200px;
  }
  .file-label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: rgba(0,0,0,0.4);
    border: 1px dashed var(--line);
    border-radius: var(--radius);
    color: var(--text-dim);
    font-size: 13px;
    cursor: pointer;
  }
  .file-label:hover { border-color: var(--accent); color: var(--text); }
  input[type=file] { display: none; }
  select {
    background: rgba(0,0,0,0.4);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 10px;
    font-size: 13px;
  }
  #uploadProgress {
    font-size: 12px;
    color: var(--accent);
  }

  /* --- Чат (плавает поверх видео на мобильном, как в Rave) --- */
  .chatbox {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    z-index: 4;
    max-height: 60%;
    display: flex;
    flex-direction: column;
    background: linear-gradient(to top, rgba(14,13,16,0.97) 45%, rgba(14,13,16,0));
  }
  .chat-header {
    padding: 14px 16px 6px;
    font-size: 13px;
    color: var(--text-dim);
    display: flex;
    justify-content: space-between;
  }
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 6px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 0;
  }
  .msg { font-size: 13px; line-height: 1.4; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }
  .msg .name { color: var(--accent); font-weight: 600; margin-right: 4px; }
  .msg.system { color: var(--text-dim); font-style: italic; font-size: 12px; }
  .chat-input {
    display: flex;
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    gap: 8px;
    flex-shrink: 0;
    background: rgba(14,13,16,0.9);
    backdrop-filter: blur(8px);
  }
  .chat-input input {
    flex: 1;
    margin: 0;
    background: rgba(0,0,0,0.45);
  }
  .chat-input button {
    background: var(--accent-dim);
    color: var(--text);
    padding: 12px 16px;
  }
  .room-badge {
    font-size: 12px;
    color: var(--text-dim);
    padding: 4px 10px;
    border: 1px solid var(--line);
    border-radius: 20px;
  }

  /* --- На широком экране: классический раскладной вид, не оверлей --- */
  @media (min-width: 900px) {
    .room-layout { display: flex; flex-direction: row; }
    .stage { position: static; flex: 1; display: flex; flex-direction: column; }
    .video-wrap { position: static; flex: 1; min-height: 240px; align-items: center; }
    .no-video { padding: 40px 20px; }
    .stage-controls {
      position: static;
      background: var(--bg-panel);
      backdrop-filter: none;
    }
    .file-label, select { background: var(--bg); }
    .chatbox {
      position: static;
      width: 320px;
      max-height: none;
      background: var(--bg-panel);
      border-left: 1px solid var(--line);
    }
    .chat-header { background: var(--bg-panel); border-bottom: 1px solid var(--line); padding: 14px 16px; }
    .chat-input { background: var(--bg-panel); backdrop-filter: none; border-top: 1px solid var(--line); padding: 12px; }
    .chat-input input { background: var(--bg-panel); }
  }
</style>
</head>
<body>

  <div class="brand">
    <div class="dot"></div>
    <h1><span>Вместе</span> · онлайн-кинотеатр для своих</h1>
  </div>

  <!-- Экран входа -->
  <div id="gate">
    <h2>Заходим в зал</h2>
    <p>Придумай имя и код комнаты — тот, с кем смотришь, вводит тот же код</p>
    <input type="text" id="nameInput" placeholder="Твоё имя" maxlength="20" />
    <input type="text" id="roomInput" placeholder="Код комнаты (например: friday-night)" maxlength="30" />
    <button class="btn-primary" onclick="enterRoom()">Войти в комнату</button>
    <div class="hint">Файл можно будет загрузить уже внутри комнаты</div>
  </div>

  <!-- Комната -->
  <div id="room">
    <div class="room-layout">
      <div class="stage">
        <div class="video-wrap" id="videoWrap">
          <div class="no-video" id="noVideo">Пока ничего не выбрано — загрузите видео или выберите из списка ниже</div>
          <video id="player" controls style="display:none;"></video>
        </div>
        <div class="stage-controls">
          <div class="upload-area">
            <label class="file-label">
              📁 Загрузить видео
              <input type="file" id="fileInput" accept="video/*" onchange="handleUpload(event)" />
            </label>
            <span id="uploadProgress"></span>
          </div>
          <select id="videoSelect" onchange="pickExisting()">
            <option value="">— выбрать уже загруженное —</option>
          </select>
          <span class="room-badge" id="roomBadge"></span>
        </div>
      </div>

      <div class="chatbox">
        <div class="chat-header">
          <span>Чат</span>
          <span id="userCount">1 зритель</span>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input">
          <input type="text" id="chatInput" placeholder="Написать..." onkeydown="if(event.key==='Enter') sendChat()" onfocus="setTimeout(setAppHeight, 50); setTimeout(setAppHeight, 350);" />
          <button onclick="sendChat()">→</button>
        </div>
      </div>
    </div>
  </div>

<script src="/socket.io/socket.io.js"></script>
<script>
  let socket;
  let room, name;
  let syncing = false; // флаг, чтобы не зациклить события play/pause/seek

  function setAppHeight() {
    const vv = window.visualViewport;
    const h = vv ? vv.height : window.innerHeight;
    document.documentElement.style.setProperty('--app-height', h + 'px');
    if (vv) {
      document.body.style.transform = 'translateY(' + (-vv.offsetTop) + 'px)';
    }
    window.scrollTo(0, 0);
  }
  setAppHeight();
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', setAppHeight);
    window.visualViewport.addEventListener('scroll', setAppHeight);
  }
  window.addEventListener('resize', setAppHeight);
  window.addEventListener('orientationchange', () => setTimeout(setAppHeight, 300));

  function enterRoom() {
    name = document.getElementById('nameInput').value.trim() || 'Гость';
    room = document.getElementById('roomInput').value.trim();
    if (!room) { alert('Введите код комнаты'); return; }

    document.getElementById('gate').style.display = 'none';
    document.getElementById('room').style.display = 'block';
    document.getElementById('roomBadge').textContent = 'комната: ' + room;

    socket = io();
    setupSocket();
    socket.emit('join-room', { room, name });
    loadVideoList();
  }

  function setupSocket() {
    const player = document.getElementById('player');

    socket.on('room-state', (state) => {
      if (state.video) {
        showVideo(state.video, false);
        player.currentTime = state.currentTime || 0;
      }
    });

    socket.on('video-selected', ({ filename }) => {
      showVideo(filename, false);
    });

    socket.on('sync-play', ({ time }) => {
      syncing = true;
      player.currentTime = time;
      player.play();
      setTimeout(() => syncing = false, 200);
    });

    socket.on('sync-pause', ({ time }) => {
      syncing = true;
      player.currentTime = time;
      player.pause();
      setTimeout(() => syncing = false, 200);
    });

    socket.on('sync-seek', ({ time }) => {
      syncing = true;
      player.currentTime = time;
      setTimeout(() => syncing = false, 200);
    });

    socket.on('chat-message', (msg) => {
      addChatMessage(msg);
    });

    socket.on('user-count', (count) => {
      document.getElementById('userCount').textContent =
        count + (count === 1 ? ' зритель' : ' зрителей');
    });
  }

  function showVideo(filename, notify) {
    const player = document.getElementById('player');
    document.getElementById('noVideo').style.display = 'none';
    player.style.display = 'block';
    player.src = '/video/' + filename;

    player.onplay = () => { if (!syncing) socket.emit('play', { room, time: player.currentTime }); };
    player.onpause = () => { if (!syncing) socket.emit('pause', { room, time: player.currentTime }); };
    player.onseeked = () => { if (!syncing) socket.emit('seek', { room, time: player.currentTime }); };

    if (notify) socket.emit('select-video', { room, filename });
  }

  async function handleUpload(event) {
    const file = event.target.files[0];
    if (!file) return;

    const formData = new FormData();
    formData.append('video', file);

    const progress = document.getElementById('uploadProgress');
    progress.textContent = 'Загрузка 0%';

    const xhr = new XMLHttpRequest();
    xhr.open('POST', '/upload');
    xhr.upload.onprogress = (e) => {
      if (e.lengthComputable) {
        const pct = Math.round((e.loaded / e.total) * 100);
        progress.textContent = 'Загрузка ' + pct + '%';
      }
    };
    xhr.onload = () => {
      if (xhr.status < 200 || xhr.status >= 300) {
        progress.textContent = 'Ошибка сервера: код ' + xhr.status;
        console.error('Upload failed, status:', xhr.status, 'body:', xhr.responseText);
        return;
      }
      let res;
      try {
        res = JSON.parse(xhr.responseText);
      } catch (e) {
        progress.textContent = 'Сервер вернул не JSON (см. консоль)';
        console.error('Bad response body:', xhr.responseText);
        return;
      }
      if (!res.filename) {
        progress.textContent = 'Сервер не вернул имя файла';
        console.error('Unexpected response:', res);
        return;
      }
      progress.textContent = 'Готово ✓';
      showVideo(res.filename, true);
      loadVideoList();
      setTimeout(() => progress.textContent = '', 3000);
    };
    xhr.onerror = () => {
      progress.textContent = 'Ошибка сети при загрузке';
      console.error('XHR network error during upload');
    };
    xhr.send(formData);
  }

  async function loadVideoList() {
    const res = await fetch('/videos');
    const files = await res.json();
    const select = document.getElementById('videoSelect');
    select.innerHTML = '<option value="">— выбрать уже загруженное —</option>';
    files.forEach(f => {
      const opt = document.createElement('option');
      opt.value = f;
      opt.textContent = f.replace(/^\d+-/, '');
      select.appendChild(opt);
    });
  }

  function pickExisting() {
    const filename = document.getElementById('videoSelect').value;
    if (filename) showVideo(filename, true);
  }

  function sendChat() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;
    socket.emit('chat-message', { room, text });
    input.value = '';
  }

  function addChatMessage(msg) {
    const box = document.getElementById('chatMessages');
    const div = document.createElement('div');
    if (msg.system) {
      div.className = 'msg system';
      div.textContent = msg.text;
    } else {
      div.className = 'msg';
      div.innerHTML = '<span class="name">' + msg.name + ':</span>' + msg.text;
    }
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }
</script>
</body>
</html>
